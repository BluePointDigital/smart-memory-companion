name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            smart-memory-orchestrator/package-lock.json
            smart-memory-ui/package-lock.json

      - name: Install orchestrator dependencies
        working-directory: smart-memory-orchestrator
        run: npm ci

      - name: Install UI dependencies
        working-directory: smart-memory-ui
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
